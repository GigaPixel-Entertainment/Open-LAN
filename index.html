<!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="icon" href="Media/LogoSquare.png">
        <title>Open-LAN</title>

        <style>
            :root {
                --bg: #1a3053;
                --acc: #113963;
                --acc2: #145492;
                --acc3: #3e84c5;
                --acc4: #0c273f;
                --text: #FFFFFF;
                --text2: #cee1f3;
                --placeholder: #BBBBBB;
                --button: #a1c3c8;
                --button-press: #90b2b7;
                --highlight: #6ea6db;
            }

            html, body {
                height: 100vh;
                background-color: var(--bg);
                overflow: hidden;
                margin: 0;
            }

            #topLogo {
                max-width: 25%;
                margin: 4px;
            }

            #rightSide {
                position: absolute;
                background-color: var(--acc4);
                width: 50%;
                height: 100%;
                right: 0;
                top: 0;
            }

            #rightWrapper {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
            }

            #rightWrapper > a {
                width: 75%;
            }

            #rightWrapper > a > button {
                width: 100%;
                font-family: "Fira Code", monospace;
                font-size: 2em;
                padding: .75em;
                font-weight: 700;
                border-radius: 0;
                cursor: pointer;
            }

            #login {
                background-color: var(--button);
                border: none;
            }

            #signup {
                background: none;
                border: 2px solid var(--button);
                color: var(--button);
            }

            #viewGithub {
                display: block;
                width: 75%;
                font-family: "Fira Code", monospace;
                font-size: 2em;
                padding: .75em;
                font-weight: 700;
                border: none;
                border-radius: 0;
                cursor: pointer;
                margin: 0 auto;
                background-color: var(--acc3);
            }

            #viewGithub:hover {
                background-color: var(--acc2);
            }

            #viewGithubWrapper {
                width: 50%;
            }

            p {
                color: var(--text);
                font-family: "Fira Code", monospace;
                font-size: 3em;
                font-weight: 500;
                width: calc(50% - .2em);
                padding: .1em;
            }

            h1 {
                color: var(--text);
                font-family: "Fire Code", monospace;
                font-size: 10em;
                font-weight: 200;
                margin: .1em;
            }

            footer {
                position: absolute;
                bottom: 0;
                left: 0;
                color: white;
                font-family: "Fire Code", monospace;
                font-size: small;
                z-index: 99;
            }

            footer > a {
                color: white;
                text-decoration-color: white;
            }

            .invisA {
                text-decoration: none;
            }
        </style>
    </head>
    <body>
        <img src="Media/Logo.png" id="topLogo">
        <p>OPEN-LAN is an open-source program that allows you to set up LAN chat rooms on your very own computer.</p>
        <div id="viewGithubWrapper">
            <a href="https://github.com/GigaPixel-Entertainment/GPE-Open-LAN" class="invisA"><button id="viewGithub">View on Github</button></a>
        </div>
        <div id="rightSide">
            <div id="rightWrapper">
                <a href="login.html"><button id="login">log in</button></a>
                <h1>OR</h1>
                <a href="signup.html"><button id="signup">sign up</button></a>
            </div>
        </div>
    </body>
    <footer>
        Open-LAN is open-source under the <a href="https://www.gnu.org/licenses/gpl-3.0.html" target="_blank">GNU General Public License</a> and available on <a href="https://github.com/GigaPixel-Entertainment/GPE-Open-LAN" target="_blank">Github</a>
    </footer>
</html>
