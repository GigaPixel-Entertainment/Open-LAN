<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="CSS/userIdent.css">
        <link rel="icon" href="Media/LogoSquare.png">
        <title>Open-LAN Signup</title>

        <style>
            form > p {
                font-size: 1.5em;
                margin-bottom: 0;
            }

            form {
                overflow-y: scroll;
                height: 50%;
                width: 50%;
            }

            #err {
                position: absolute;
                width: 40%;
                height: 50%;
                top: 50%;
                right: 8px;
                background-color: rgba(255, 0, 0, .5);
                border: 2px solid red;
                border-radius: 1em;
                transform: translateY(-50%);
                visibility: hidden;
            }

            #err > h1 {
                margin-left: 8px;
                margin-right: 8px;
            }

            #err > p {
                margin-left: 8px;
                margin-right: 8px;

            }
        </style>
    </head>
    <body>
        <a href="index.html"><img src="Media/Logo.png" id="smallTopLogo"></a>
        <h1 class="title center text font">SIGN UP</h1>
        
        <form id="signupForm">
            <p class="font text">real name</p>
            <input type="text" placeholder="name" class="font smallEntry" required id="realname">
            <p class="font text">username</p>
            <input type="text" placeholder="username" class="font smallEntry" required id="username">
            <p class="font text">password</p>
            <div id="pwdWrapper">
                <input type="password" placeholder="password" class="font smallEntry" id="password" required>
                <button class="showPwd2" id="showPwd" type="button" onclick="togglePwd()"><img src="Media/eyeOpen.png" class="showPwdImg" id="showPwdImg"></button>
            </div>
            <p class="font text">confirm password</p>
            <div id="pwdWrapper">
                <input type="password" placeholder="confirm password" class="font smallEntry" id="confirmPassword" required>
                <button class="showPwd2" id="showConfirmPwd" type="button" onclick="toggleConfirmPwd()"><img src="Media/eyeOpen.png" class="showPwdImg" id="showConfirmPwdImg"></button>
            </div>
            <p class="font text">security key</p>
            <input type="text" placeholder="security key" class="font smallEntry" required id="secKey">
            <br>
            <input type="checkbox" required name="tosAgree">
            <label for="tosAgree" class="font text">I agree to Open-LAN <a href="tos.html" class="text" target="_blank">Terms of Service</a></label>
            <br>
            <div id="submitWrapper">
                <input type="submit" value="submit" class="font" id="submitBtn">
            </div>
        </form>

        <div id="err">
            <h1 class="font text" id="errTitle">Err Title</h1>
            <p class="font text" id="errContent">Err Contents</p>
        </div>

        <div id="loginWrapper">
            <p class="font text" id="loginLabel">If you have an account</p>
            <a href="login.html"><button class="font" id="login">login</button></a>
        </div>

        <script>
            const pwdEntry = document.getElementById("password")
            const showPwdImg = document.getElementById("showPwdImg")

            const cpwdEntry = document.getElementById("confirmPassword")
            const cshowPwdImg = document.getElementById("showConfirmPwdImg")

            function togglePwd() {
                if (pwdEntry.type == "password") {
                    pwdEntry.type = "text"
                    showPwdImg.src = "Media/eyeClose.png"
                } else {
                    pwdEntry.type = "password"
                    showPwdImg.src = "Media/eyeOpen.png"
                }
            }

            function toggleConfirmPwd() {
                if (cpwdEntry.type == "password") {
                    cpwdEntry.type = "text"
                    cshowPwdImg.src = "Media/eyeClose.png"
                } else {
                    cpwdEntry.type = "password"
                    cshowPwdImg.src = "Media/eyeOpen.png"
                }
            }
        </script>
        <script>
            // Errors
            const errBox = document.getElementById("err")
            const errTitle = document.getElementById("errTitle")
            const errContent = document.getElementById("errContent")

            function setError(title, content) {
                if (title == "" && content == "") {
                    errBox.style.visibility = "hidden"
                    return
                }

                errTitle.textContent = title
                errContent.textContent = content
                errBox.style.visibility = "visible"
            }
        </script>
        <script>
            // No-cache
            window.addEventListener('pageshow', function (event) {
                if (event.persisted) {
                    window.location.reload();
                }
            });
        </script>
        <script>
            // Login
            const signupForm = document.getElementById("signupForm")
            const submitBtn = document.getElementById("submitBtn")
            const username = document.getElementById("username")
            const password = document.getElementById("password")
            const retypePassword = document.getElementById("confirmPassword")
            const realName = document.getElementById("realname")
            const secKey = document.getElementById("secKey")

            const protocol = window.location.protocol
            const domainURL = window.location.host
            const WsProtocol = protocol == "http:" ? "ws:" : "wss:"

            if (protocol == "http:") {
                document.getElementById("httpNotice").style.visibility = "visible"
            }

            function switchHTTPS() {
                window.location.assign("https://" + domainURL + "/login.html")
            }

            var wsURL = WsProtocol + "//" + window.location.hostname + ":" + (WsProtocol == "ws:" ? 33334 : 33335)
            var wsUrlReady = new Promise((res) => {
                try {
                    const resp = fetch(protocol + "//" + domainURL + "/api/" + WsProtocol.split(":")[0] + "url", {
                            method: "GET",
                            cache: 'no-store',
                            headers: {
                                "Content-Type": "text/plain",
                                "Domain-Url": window.location.hostname
                            }
                        }).then((r) => {
                            wsURL = r.headers.get("Url")
                            res(wsURL)
                        }).catch((r) => {
                            console.log("Failed to fetch websocket port! Using default")
                            res(wsURL)
                        })
                } catch {
                    console.log("Failed to fetch websocket port! Using default")
                    res(wsURL)
                }
            })

            var encrypted = false

            console.log("Connecting to websocket via " + WsProtocol + "//")

            const hexToBytes = hex => Uint8Array.from(hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            const bytesToHex = bytes => Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
            const textEncode = (text) => new TextEncoder().encode(text);
            const textDecode = (text) => new TextDecoder().decode(text);
            var sharedSecretKey = null
            var keyPair = null

            async function generatePubKey() {
                keyPair = await crypto.subtle.generateKey(
                    { name: "ECDH", namedCurve: "P-256" },
                    false,
                    ["deriveKey", "deriveBits"]
                );
                const pubBuffer = await crypto.subtle.exportKey("raw", keyPair.publicKey);
                const pubBytes = new Uint8Array(pubBuffer);

                return pubBytes
            }

            async function serverKeyRecieved(serverKey) {
                const serverPubBytes = hexToBytes(serverKey);
                const serverPublicKey = await crypto.subtle.importKey(
                    "raw",
                    serverPubBytes,
                    { name: "ECDH", namedCurve: "P-256" },
                    true,
                    []
                );

                const sharedSecretBuffer = await crypto.subtle.deriveBits(
                    { name: "ECDH", public: serverPublicKey },
                    keyPair.privateKey,
                    256
                );

                var sharedSecretBytes = new Uint8Array(sharedSecretBuffer);

                sharedSecretKey = await crypto.subtle.importKey(
                    "raw",
                    sharedSecretBytes,
                    { name: "AES-GCM" },
                    false,
                    ["encrypt", "decrypt"]
                )

                sharedSecretBytes.fill(0)
                sharedSecretBytes = null
            }

            async function encryptAES(text) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const encodedText = textEncode(text);

                const ciphertext = await window.crypto.subtle.encrypt(
                    { name: "AES-GCM", iv: iv }, key, encodedText
                );

                return {
                    iv: bytesToHex(iv),
                    ciphertext: bytesToHex(new Uint8Array(ciphertext))
                };
            }

            async function decryptAES(ivHex, ciphertextHex) {
                const iv = hexToBytes(ivHex);
                const ciphertext = hexToBytes(ciphertextHex);

                const decryptedBuffer = await window.crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv }, key, ciphertext
                );

                return textDecode(decryptedBuffer);
            }

            wsUrlReady.then((wsURL) => {
                generatePubKey().then((pubBytes) => {
                    try {
                        const ws = new WebSocket(wsURL);

                        ws.onopen = (ev) => {
                            console.log("Websocket Connected!")
                            ws.send(JSON.stringify({"type":"encrypt-key-xch", "publicKey": bytesToHex(pubBytes)}))
                        }

                        ws.onmessage = (event) => {
                            const resp = JSON.parse(event.data)

                            if (resp["type"] == "encrypt-key-xch") {
                                serverKeyRecieved(resp["publicKey"]).then(() => {
                                    encrypted = true

                                    const origSend = ws.send
                                    ws.send = function(data) {
                                        encryptAES(data).then((encryptionResults) => {
                                            origSend.call(ws, JSON.stringify({"encryption": "AES", "iv": encryptionResults["iv"],"body":encryptionResults["ciphertext"]}))
                                        })
                                    }
                                    console.log("Encrypted with AES!")
                                })
                            }

                            if (resp["encryption"] == "AES") {
                                if (encrypted) {
                                    decryptAES(resp["iv"], resp["body"]).then((data) => {
                                        respBody = JSON.parse(data)

                                        if (respBody["type"] == "signupSuccess") {
                                            window.location.assign(protocol + "//" + domainURL + respBody["redirect"])
                                        } else if (respBody["type"] == "signupFailed") {
                                            submitBtn.value = "login"
                                            submitBtn.disabled = false
                                            setError("Sign up Failed", respBody["reason"])
                                        }
                                    })
                                } else {
                                    console.log("Recieved encrypted message, but we are not ready!")
                                }
                            }
                        };

                        ws.onerror = (error) => {
                            console.error("WebSocket Error: " + error);
                        };

                        ws.onclose = (event) => {
                            console.log("Connection closed:", event.reason);
                            console.log("Attempting reconnect...")
                            setTimeout(() => window.location.reload(), 5000)
                        };

                        signupForm.addEventListener("submit", (event) => {
                            event.preventDefault()

                            if (password.value.trim() != retypePassword.value.trim()) {
                                setError("Incorrect Password", "Passwords must match!")
                                return
                            }

                            setError("", "")

                            submitBtn.value = "working"
                            submitBtn.disabled = true
                            
                            console.log("Requested!")
                            ws.send(JSON.stringify({"type":"signup", "realname": realName.value, "username":username.value, "password": btoa(password.value.trim()), "securityKey": secKey.value}))
                        })
                    } catch (err) {
                        console.log(err)
                        console.log("Websocket Connection Failed!")
                        setError("Failed to Connect", "Failed to connect to the server. Please try again later.")
                    }
                })
            })
            
        </script>
    </body>

</html>
