<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="icon" href="Media/LogoSquare.png">
        <title>Open-LAN</title>

        <style>
            :root {
                --bg: #1a3053;
                --acc: #113963;
                --acc2: #145492;
                --acc3: #3e84c5;
                --acc4: #0c273f;
                --text: #FFFFFF;
                --text2: #cee1f3;
                --placeholder: #BBBBBB;
                --button: #a1c3c8;
                --button-press: #90b2b7;
            }

            html, body {
                height: 100vh;
            }

            body {
                overflow: hidden;
                background-color: var(--bg);
            }

            footer {
                position: absolute;
                bottom: 0;
                left: 0;
                color: white;
                font-family: "Fire Code", monospace;
                font-size: small;
            }

            footer > a {
                color: white;
                text-decoration-color: white;
            }
        </style>
    </head>

    </footer>
</html>
