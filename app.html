<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fira+Code:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link rel="icon" href="Media/LogoSquare.png">
        <title>Open-LAN</title>

        <style>
            :root {
                --bg: #1a3053;
                --acc: #113963;
                --acc2: #145492;
                --acc3: #3e84c5;
                --acc4: #0c273f;
                --acc5: #214685;
                --acc6: #3e77d7;
                --text: #FFFFFF;
                --text2: #cee1f3;
                --placeholder: #BBBBBB;
                --button: #a1c3c8;
                --button-press: #90b2b7;
                --highlight: #6ea6db;
                --sendButtonGreen: #92c37c;
                --rose: #e99898;
            }

            html, body {
                height: 100vh;
                overflow: hidden;
            }

            body {
                background-color: var(--bg);
                margin: 0;
            }

            footer {
                position: absolute;
                bottom: 0;
                left: 0;
                color: white;
                font-family: "Fire Code", monospace;
                font-size: small;
                z-index: 99;
            }

            footer > a {
                color: white;
                text-decoration-color: white;
            }

            #serverList {
                width: 5%;
                height: 100%;
                background-color: var(--acc2);
            }

            #msgBoxHeader {
                position: absolute;
                top: 0;
                left: 5%;
                width: 95%;
                background-color: var(--acc4);
                display: flex;
            }

            #msgBoxHeader > p {
                font-style: italic;
                font-size: 1.25em;
                font-weight: 100;
                margin-left: 1em;
                margin-top: 1em;
                margin-bottom: 1em;
                width: 85%;
            }

            #msgBoxHeader > button {
                width: 15%;
                border: none;
                border-radius: 0;
                background-color: var(--acc3);
                cursor: pointer;
                font-size: 1.25em;
            }

            #msgBox {
                position: absolute;
                width: 95%;
                height: calc(100% - 40px - 1.25em);
                bottom: 0;
                left: 5%;
                background-color: var(--bg);
                overflow-x: hidden;
            }

            #friendsHeader {
                position: absolute;
                display: flex;
                top: 0;
                right: 0;
                width: 100%;
                height: 10%;
                background-color: var(--highlight);
                justify-content: center;
                align-items: center;
                flex-direction: row;
            }

            #friendsHeader > img {
                width: 4em;
                height: 4em;
                background-color: var(--acc2);
                margin: 1em;
            }

            #friendsHeader > p {
                display: block;
                font-size: 2em;
                margin: auto;
                margin-left: 0;
            }

            #friendsList {
                position: absolute;
                width: 100%;
                height: 90%;
                background-color: var(--acc3);
                right: 0;
                top: 10%;
            }

            #friendsList > p {
                margin-left: 1em;
            }

            #textEntryWrapper {
                position: absolute;
                width: 80%;
                height: fit-content;
                background-color: var(--acc);
                bottom: 2.5%;
                right: 7.5%;
                padding: 0;
            }

            #textEntry {
                width: calc(92.5% - 1em);
                font-size: 1.5em;
                margin: .25em;
                margin-bottom: 0;
                padding: .25em;
                border: none;
                background-color: var(--acc5);
                color: var(--text);
                outline: none;
                max-height: 16vh;
                field-sizing: content;
                resize: none;
            }

            #sendMsg {
                position: absolute;
                width: 7%;
                font-size: 1.5em;
                margin: .25em auto;
                height: calc(100% - .5em);
                border: none;
                border-radius: 0;
                background-color: var(--acc5);
                color: var(--sendButtonGreen);
                font-weight: bolder;
                cursor: pointer;
            }

            #sendMsg:hover {
                background-color: var(--bg);
            }

            .smallTime {
                position: absolute;
                width: 100%;
                margin: 0;
                margin-top: .8em;
                font-size: .65em;
                color: darkgray;
                visibility: hidden;
            }

            #textEntry::placeholder {
                color: var(--acc4);
                font-style: italic;
            }

            #friendsListWrapper {
                position: absolute;
                top: 0;
                right: 0;
                width: 25%;
                height: 100%;
                box-shadow: 0px 0px 4px 4px rgba(0, 0, 0, .5);
                transform: translateX(calc(100% + 8px));
                transition: transform 500ms ease-in-out;
            }

            #toggleFriendsList {
                position: absolute;
                left: 0;
                bottom: 0;
                transform: translate(-90%, 100%);
                width: 20%;
                font-size: 2em;
                border: none;
                border-radius: 0;
                background-color: var(--acc6);
                font-weight: 700;
                text-align: center;
                cursor: pointer;
            }

            #myProfileScreen {
                position: absolute;
                width: 100%;
                height: 100%;
                top: 0;
                left: 0;
                z-index: 3;
                background-color: var(--bg);
                box-shadow: 0px 0px 4px 4px rgba(0, 0, 0, .5);
                transform: translateY(calc(-100% - 8px));

                transition: transform 0.5s ease-in-out;
            }

            #myProfileHeader {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                background-color: var(--acc4);
                display: flex;
            }

            #myProfileHeader > p {
                font-style: italic;
                font-size: 1.25em;
                font-weight: 100;
                margin-left: 1em;
                margin-top: 1em;
                margin-bottom: 1em;
                width: 85%;
            }

            #myProfileHeader > button {
                width: 15%;
                border: none;
                border-radius: 0;
                background-color: var(--acc3);
                cursor: pointer;
                font-size: 1.25em;
            }

            #myProfileLeft {
                position: absolute;
                left: 0;
                bottom: 0;
                width: 40%;
                height: 90%;
            }

            #myProfileRight {
                position: absolute;
                right: 0;
                bottom: 0;
                width: 60%;
                height: 90%;
            }

            #myProfileEditingList {
                display: flex;
                flex-direction: column;
            }

            #myProfileEditingList > div {
                display: flex;
                flex-direction: row;
                width: 100%;
                align-items: center;
                justify-content: end;
            }

            #myProfileEditingList > div > p {
                font-size: 2em;
                font-weight: 500;
                width: 10em;
                text-align: right;
            }

            #myProfileEditingList > div > input {
                font-size: 2em;
                height: 1em;
                margin-left: .5em;
                margin-right: .5em;
                width: 15em;
                border: none;
                border-radius: 0;
                background-color: var(--acc5);
                padding: .25em;
            }

            .editBtn {
                font-size: 2em;
                width: 4em;
                background-color: var(--rose);
                border: none;
                border-radius: 0;
                cursor: pointer;
                margin-right: .5em;
            }

            .saveBtn {
                font-size: 2em;
                width: 4em;
                background-color: var(--sendButtonGreen);
                border: none;
                border-radius: 0;
                cursor: pointer;
                margin-right: .5em;
            }

            #loadingOverlay {
                position: absolute;
                top: 0;
                left: 0;
                background-color: var(--bg);
                width: 100%;
                height: 100%;
                z-index: 98;
                cursor: wait;

                transition: opacity 0.5s linear;
            }

            #loadingOverlay > img {
                position: absolute;
                max-width: 50%;
                max-height: 50%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            #loadingOverlay > p {
                position: absolute;
                bottom: 10%;
                width: 100%;
                text-align: center;
                font-size: 2em;
            }

            .font {
                font-family: "Fira Code", monospace;
            }

            .white {
                color: var(--text);
            }

            .black {
                color: black;
            }

            .scroll {
                overflow-y: scroll;
            }

            .messageDiv {
                width: 100%;
                background-color: var(--bg);
                display: flex;
                justify-content: space-between;
                padding: 1em;
                padding-bottom: 0;
            }

            .messageDiv:hover {
                background-color: var(--acc);
            }

            .invis { 
                opacity: 0;
            }

            ::-webkit-scrollbar {
                width: 5px;
            }
            
            ::-webkit-scrollbar-track {
                background: rgb(0, 0, 0, 0); 
            }
            
            ::-webkit-scrollbar-thumb {
                background: #333;
                border-radius: 10000px;
            }
            
            ::-webkit-scrollbar-thumb:hover {
                background: #111;
            }
        </style>
    </head>
    <body>
        <div id="serverList"></div>
        <div id="msgBoxHeader">
            <p class="font white" id="ChatName">You are chatting with: The Void</p>
            <button class="font white" onclick="showMyProfileScreen()">my profile ↓</button>
        </div>
        <div id="msgBox" class="scroll">

        </div>
        <div id="textEntryWrapper">
            <textarea placeholder="type a message..." id="textEntry" class="font"></textarea>
            <button id="sendMsg" class="font">-></button>
        </div>

        <div id="friendsListWrapper">
            <div id="friendsHeader">
                <img src="Media/FriendsIcon.png">
                <p class="font black">friends (0)</p>
                <button id="toggleFriendsList" class="font white" onclick="hideFriendsList()"><</button>
            </div>
            <div id="friendsList" class="scroll">
                <p class="font white">active messages</p>
            </div>
        </div>

        <div id="myProfileScreen">
            <div id="myProfileHeader">
                <p class="font white" id="ChatName">my profile settings</p>
                <button class="font white" onclick="showMyProfileScreen()">go back ↑</button>
            </div>

            <div id="myProfileLeft">

            </div>
            
            <div id="myProfileRight">
                <div id="myProfileEditingList">
                    <div>
                        <p class="font white">username</p>
                        <input type="text" disabled class="font" id="currUsername">
                        <button class="font black editBtn invis" style="cursor: auto;">edit</button>
                    </div>
                    <div>
                        <p class="font white">displayname</p>
                        <input type="text" disabled class="font" id="currDisplayname">
                        <button class="font black editBtn" id="editDisplayname">edit</button>
                    </div>
                    <div>
                        <p class="font white">birthday</p>
                        <input type="date" disabled class="font" id="currBirthday">
                        <button class="font black editBtn" id="editBirthday">edit</button>
                    </div>
                    <div>
                        <p class="font white">pronouns</p>
                        <input type="text" disabled class="font" id="currPronouns">
                        <button class="font black editBtn" id="editPronouns">edit</button>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="loadingOverlay">
            <img src="Media/Logo.png">
            <p class="font white" id="loadingText">Connecting to server...</p>
        </div>
    </body>
    <footer>
        Open-LAN is open-source under the <a href="https://www.gnu.org/licenses/gpl-3.0.html">GNU General Public License</a> and available on <a href="https://github.com/GigaPixel-Entertainment/GPE-Open-LAN">Github</a>
    </footer>

    <script>
        // Misc UI
        const friendsListWrapper = document.getElementById("friendsListWrapper")
        const toggleFriendsList = document.getElementById("toggleFriendsList")
        const myProfileScreen = document.getElementById("myProfileScreen")
        const chatName = document.getElementById("ChatName")

        const chatDiv = document.getElementById("msgBox")

        var currChat = 0

        var friendsListShown = false
        function hideFriendsList() {
            if (friendsListShown) {
                friendsListWrapper.style.transform = "translateX(calc(100% + 8px))"
                toggleFriendsList.textContent = "<"
            } else {
                friendsListWrapper.style.transform = "translateX(0%)"
                toggleFriendsList.textContent = ">"
            }

            friendsListShown = !friendsListShown
        }

        var myProfileScreenShown = false
        function showMyProfileScreen() {
            if (myProfileScreenShown) {
                myProfileScreen.style.transform = "translateY(calc(-100% - 8px))"
            } else {
                myProfileScreen.style.transform = "translateY(0%)"
            }

            myProfileScreenShown = !myProfileScreenShown
        }

        const currUsernameI = document.getElementById("currUsername")
        const currDisplaynameI = document.getElementById("currDisplayname")
        const editCurrDisplayname = document.getElementById("editDisplayname")
        const currBirthdayI = document.getElementById("currBirthday")
        const editCurrBirthday = document.getElementById("editBirthday")
        const currPronounsI = document.getElementById("currPronouns")
        const editCurrPronouns = document.getElementById("editPronouns")

        function popUserInfo(resp) {
            currUsernameI.value = resp["username"]
            currDisplaynameI.value = resp["displayname"]

            if (resp["birthday"] && type(resp["birthday"]) == "Number") {
                currBirthdayI.value = resp["birthday"]
            }

            currPronounsI.value = resp["pronouns"]
        }

        var editingDisplayname = false
        var origDisplayname = ""
        editCurrDisplayname.onclick = () => {
            if (editingDisplayname) {
                editCurrDisplayname.classList = "font black editBtn"
                editCurrDisplayname.textContent = "edit"
                currDisplaynameI.classList.remove("white")
                currDisplaynameI.disabled = true

                if (currDisplaynameI.value.trim() == "" || currDisplaynameI.value.trim().length > 30 ) {
                    currDisplaynameI.value = origDisplayname
                } else {
                    request(JSON.stringify({
                        "type": "updateDisplayname",
                        "displayname": currDisplaynameI.value.trim()
                    })).then((respBody) => {
                        if (respBody["type"] == "updateDisplaynameFailed") {
                            currDisplaynameI.value = origDisplayname
                            console.log("Update failed!")
                        }
                    })
                }
            } else {
                editCurrDisplayname.classList = "font black saveBtn"
                editCurrDisplayname.textContent = "save"
                currDisplaynameI.classList.add("white")
                currDisplaynameI.disabled = false
                origDisplayname = currDisplaynameI.value
            }
            editingDisplayname = !editingDisplayname
        }

        function genMsg(message) {
            const lines = message["content"].split("\n")
            const msgP = document.createElement("p")
            msgP.classList = "font white"
            msgP.style.margin = ".1em"

            for (let line = 0; line < lines.length; line++) {
                const lineContent = lines[line];
                const words = lineContent.split(" ")

                for (let index = 0; index < words.length; index++) {
                    const word = words[index];

                    var wordE = null
                    if (word.startsWith("http://") || word.startsWith("https://")) {
                        wordE = document.createElement("a")
                        wordE.href = word
                        wordE.target = "_blank"
                        wordE.style.color = "var(--highlight)"
                    } else {
                        wordE = document.createElement("p")
                    }
                    wordE.textContent = word + (index + 1 < words.length ? " " : "")
                    wordE.style.display = "inline-block"
                    wordE.style.width = "max-content"
                    wordE.style.wordWrap = "normal"
                    wordE.style.margin = "0"
                    wordE.style.whiteSpace = "pre-wrap"
                    msgP.appendChild(wordE)
                }

                if (line + 1 < lines.length) {
                    var br = document.createElement("br")
                    msgP.appendChild(br)
                }
            }
            

            return msgP
        }

        const userInfoCache = []
        async function setChat(chat) {
            if (chat["CID"] != currChat) {
                return
            }

            const currScroll = chatDiv.scrollTop
            const atBottom = currScroll + chatDiv.offsetHeight >= chatDiv.scrollHeight - 8

            const currChatName = chat["Name"]
            const currChatType = chat["Type"]

            if (currChatType == "server" || currChatType == "forced-server") {
                chatName.textContent = "You are chatting on: " + currChatName
            } else if (currChatType == "dm") {
                chatName.textContent = "You are chatting with: " + currChatName
            }

            if (chat["messages"].length == 0) {
                chatDiv.replaceChildren()
                return
            }

            chat["messages"].sort((a, b) => a["time"] - b["time"]);

            requiredUIDs = []
            chat["messages"].forEach(message => {
                if (!requiredUIDs.includes(message["UID"])) {
                    cached = false
                    for (let cacheIndex = 0; cacheIndex < userInfoCache.length; cacheIndex++) {
                        const cache = userInfoCache[cacheIndex];
                        
                        if (cache["UID"] == message["UID"]) {
                            cached = true
                            break
                        }
                    }

                    if (!cached) {
                        requiredUIDs.push(message["UID"])
                    }
                }
            });

            if (requiredUIDs.length > 0) {
                userInfoList = await request(JSON.stringify({"type":"reqUsersList","users":requiredUIDs}))

                userInfoList["users"].forEach((info) => {
                    userInfoCache.push(info)
                })
            }

            if (loading) {
                loadingStatus += 1
            }

            chatDiv.replaceChildren()

            lastMsg = null

            for (let index = 0; index < chat["messages"].length; index++) {
                const message = chat["messages"][index];
                var messageDiv = null

                if (lastMsg) {
                    if (message["UID"] == lastMsg["UID"] && message["time"] - lastMsg["time"] < 10*60) {
                        messageDiv = genSmallMsg(userInfoCache, message)

                    } else {
                        messageDiv = genFullMsg(userInfoCache, message)
                    }
                } else {
                    messageDiv = genFullMsg(userInfoCache, message)
                }

                chatDiv.appendChild(messageDiv)
                lastMsg = message
            }

            const padding = document.createElement("div")
            padding.style.width = "100%"
            padding.style.height = "5em"
            chatDiv.appendChild(padding)

            if (atBottom) {
                chatDiv.scrollTop = chatDiv.scrollHeight
            } else {
                chatDiv.scrollTop = currScroll
            }

            if (currScroll + chatDiv.offsetHeight >= chatDiv.scrollHeight - 8) {
                chatDiv.scrollTop = chatDiv.scrollHeight
            }
        }

                }

    <script>
            // Network
            const loadingText = document.getElementById("loadingText")

            const protocol = window.location.protocol
            const domainURL = window.location.host
            const WsProtocol = protocol == "http:" ? "ws:" : "wss:"

            const trackerIds = []
            const trackerIdToFunc = []

            var wsURL = WsProtocol + "//" + window.location.hostname + ":" + (WsProtocol == "ws:" ? 33334 : 33335)
            var wsUrlReady = new Promise((res) => {
                try {
                    const resp = fetch(protocol + "//" + domainURL + "/api/" + WsProtocol.split(":")[0] + "url", {
                            method: "GET",
                            cache: 'no-store',
                            headers: {
                                "Content-Type": "text/plain",
                                "Domain-Url": window.location.hostname
                            }
                        }).then((r) => {
                            wsURL = r.headers.get("Url")
                            res(wsURL)
                        }).catch((r) => {
                            console.log("Failed to fetch websocket port! Using default")
                            res(wsURL)
                        })
                } catch {
                    console.log("Failed to fetch websocket port! Using default")
                    res(wsURL)
                }
            })

            var sharedSecretBytes = null
            var encrypted = false
            var loading = true
            var loadingStatus = 0

            const hexToBytes = hex => Uint8Array.from(hex.match(/.{1,2}/g).map(byte => parseInt(byte, 16)));
            const bytesToHex = bytes => Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
            const textEncode = (text) => new TextEncoder().encode(text);
            const textDecode = (text) => new TextDecoder().decode(text);
            var keyPair = null
            var ws = null

            async function generatePubKey() {
                keyPair = await crypto.subtle.generateKey(
                    { name: "ECDH", namedCurve: "P-256" },
                    true,
                    ["deriveKey", "deriveBits"]
                );
                const pubBuffer = await crypto.subtle.exportKey("raw", keyPair.publicKey);
                const pubBytes = new Uint8Array(pubBuffer);

                return pubBytes
            }

            async function serverKeyRecieved(serverKey) {
                const serverPubBytes = hexToBytes(serverKey);
                const serverPublicKey = await crypto.subtle.importKey(
                    "raw",
                    serverPubBytes,
                    { name: "ECDH", namedCurve: "P-256" },
                    true,
                    []
                );

                const sharedSecretBuffer = await crypto.subtle.deriveBits(
                    { name: "ECDH", public: serverPublicKey },
                    keyPair.privateKey,
                    256
                );

                sharedSecretBytes = new Uint8Array(sharedSecretBuffer);
            }

            async function encryptAES(text, rawKey) {
                const key = await window.crypto.subtle.importKey(
                    "raw", rawKey, { name: "AES-GCM" }, false, ["encrypt"]
                );

                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const encodedText = textEncode(text);

                const ciphertext = await window.crypto.subtle.encrypt(
                    { name: "AES-GCM", iv: iv }, key, encodedText
                );

                return {
                    iv: bytesToHex(iv),
                    ciphertext: bytesToHex(new Uint8Array(ciphertext))
                };
            }

            async function decryptAES(ivHex, ciphertextHex, rawKey) {
                const key = await window.crypto.subtle.importKey(
                    "raw", rawKey, { name: "AES-GCM" }, false, ["decrypt"]
                );

                const iv = hexToBytes(ivHex);
                const ciphertext = hexToBytes(ciphertextHex);

                const decryptedBuffer = await window.crypto.subtle.decrypt(
                    { name: "AES-GCM", iv: iv }, key, ciphertext
                );

                return textDecode(decryptedBuffer);
            }

            async function fetchSelfData() {
                ws.send(JSON.stringify({"type": "reqUser"}))
            }

            async function fetchChatData(CID) {
                ws.send(JSON.stringify({"type": "reqChat", "CID": CID}))
            }

            async function waitUntilLoadingDone() {
                if (!loading) {
                    return
                }

                return new Promise((resolve) => {
                    const checkLoad = () => {
                        if (loadingStatus >= 3) {
                            resolve()
                        } else {
                            setTimeout(checkLoad, 100)
                        }
                    };
                    checkLoad();
                })
            }

            async function waitUntilPageReady() {
                return new Promise((resolve) => {
                    const checkReady = () => {
                        if (document.readyState == "complete") {
                            resolve()
                        } else {
                            setTimeout(checkReady, 100)
                        }
                    };
                    checkReady();
                })
            }

            async function load() {
                loadingText.textContent = "Fetching user data..."
                await fetchSelfData()
                loadingText.textContent = "Fetching chat data..."
                await fetchChatData(0)

                await waitUntilLoadingDone()

                loadingText.textContent = "Waiting for page..."

                await waitUntilPageReady()

                loading = false
                loadingText.textContent = ""
                document.getElementById("loadingOverlay").style.opacity = 0
                setTimeout(() => {
                    document.getElementById("loadingOverlay").remove()
                }, 500)
            }

            function genTrackerId() {
                const trackerId = Math.round(Math.random() * 10000000000)

                if (trackerIds.includes(trackerId)) {
                    return genTrackerId()
                }

                return trackerId
            }

            async function request(data) {
                return new Promise((resolve) => {
                    const trackerId = genTrackerId()
                    trackerIds.push(trackerId)
                    trackerIdToFunc.push([trackerId, resolve])
                    const dataParsed = JSON.parse(data)
                    dataParsed["trackerID"] = trackerId
                    ws.send(JSON.stringify(dataParsed))
                })
            }

            async function trackerHit(trackerId, resp) {
                trackerIds.splice(trackerIds.indexOf(trackerId), 1)
                trackerIdToFunc.forEach(element => {
                    if (element[0] == trackerId) {
                        trackerIdToFunc.splice(trackerIdToFunc.indexOf(element), 1)
                        element[1](resp)
                    }
                });
            }

            wsUrlReady.then((wsURL) => {
                console.log("Connecting to websocket via " + WsProtocol + "//")

                generatePubKey().then((pubBytes) => {
                    try {
                        ws = new WebSocket(wsURL);

                        ws.onopen = (ev) => {
                            console.log("Websocket Connected!")
                            ws.send(JSON.stringify({"type":"encrypt-key-xch", "publicKey": bytesToHex(pubBytes)}))
                            loadingText.textContent = "Encrypting..."
                        }

                        ws.onmessage = (event) => {
                            const resp = JSON.parse(event.data)

                            if (resp["type"] == "encrypt-key-xch") {
                                serverKeyRecieved(resp["publicKey"]).then(() => {
                                    encrypted = true

                                    const origSend = ws.send
                                    ws.send = function(data) {
                                        encryptAES(data, sharedSecretBytes).then((encryptionResults) => {
                                            origSend.call(ws, JSON.stringify({"encryption": "AES", "iv": encryptionResults["iv"],"body":encryptionResults["ciphertext"]}))
                                        })
                                    }
                                    console.log("Encrypted with AES!")

                                    load()
                                })
                            }

                            if (resp["encryption"] == "AES") {
                                if (encrypted) {
                                    decryptAES(resp["iv"], resp["body"], sharedSecretBytes).then((data) => {
                                        respBody = JSON.parse(data)
                                        trackerId = respBody["trackerID"]

                                        console.log(respBody)
                                        if (respBody["type"] == "auth_expired") {
                                            window.location.assign(protocol + "//" + domainURL + "/login.html?errT=Login%20Expired&errC=Your%20session%20has%20expired.%20Please%20try%20logging%20in%20again.")
                                        }

                                        if (respBody["type"] == "reqUserSuccess") {
                                            if (loading) {
                                                loadingStatus += 1
                                            }

                                            popUserInfo(respBody)
                                            if (trackerId && trackerIds.includes(trackerId)) {
                                                trackerHit(trackerId, respBody)
                                            }
                                        }

                                        if (respBody["type"] == "reqChatSuccess") {
                                            if (loading) {
                                                loadingStatus += 1
                                            }

                                            
                                            setChat(respBody["chat"])
                                        }

                                        if (respBody["type"] == "reqUsersListSuccess") {
                                            if (trackerId && trackerIds.includes(trackerId)) {
                                                trackerHit(trackerId, respBody)
                                            }
                                        }

                                        if (respBody["type"] == "chatUpdate") {
                                            setChat(respBody["chat"])
                                        }

                                        if (respBody["type"] == "updateDisplaynameSuccess") {
                                            if (trackerId && trackerIds.includes(trackerId)) {
                                                trackerHit(trackerId, respBody)
                                            }
                                        }

                                        if (respBody["type"] == "updateCachedDisplayname") {
                                            updateCachedDisplayname(respBody)
                                        }

                                        if (respBody["type"] == "reqUserFailed") {
                                            if (loading) {
                                                fetchSelfData()
                                            } else {

                                            }
                                        }

                                        if (resp["type"] == "reqChatFailed") {
                                            if (loading) {
                                                fetchChatData(0)
                                            }
                                        }

                                        if (respBody["type"] == "updateDisplaynameFailed") {
                                            if (trackerId && trackerIds.includes(trackerId)) {
                                                trackerHit(trackerId, respBody)
                                            }
                                        }
                                    })
                                } else {
                                    console.log("Recieved encrypted message, but we are not ready!")
                                }
                            }
                        };

                        ws.onerror = (error) => {
                            console.error("WebSocket Error: " + error);
                            
                        };

                        ws.onclose = (event) => {
                            console.log('Connection closed:', event.reason);

                            console.log("Attempting reconnect...")
                            loadingText.textContent = "Connection lost"
                            setTimeout(window.location.reload, 5000)
                        };
                    } catch {
                        console.log("Websocket Connection Failed!")
                        console.log("Attempting reconnect...")
                        window.location.reload()
                    }
                })
            })

            
    </script>
    <script>
        // Send msg
        const textEntry = document.getElementById("textEntry")
        const sendMsgBtn = document.getElementById("sendMsg")

        async function sendMsg() {
            message = textEntry.value.trim()
            textEntry.value = ""

            if (message == "") {
                return
            }

            msgSendResults = await request(JSON.stringify({"type":"sendMsg","CID":currChat,"msg":message}))
        }

        sendMsgBtn.onclick = () => {
            sendMsg()
        }

        textEntry.addEventListener("keydown", (event) => {
            if (event.key == "Enter" && !event.shiftKey) {
                event.preventDefault()
                sendMsg()
            }
        })


        document.addEventListener("keydown", (key) => {
            if (key.key == "/" && textEntry != document.activeElement) {
                key.preventDefault()
                textEntry.focus()
            }
        })
    </script>
